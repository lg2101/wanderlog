<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wanderlog — World Travel Map</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --tc: #C4622D; --tcl: #D4845A; --tcd: #9E4E24; --tcdeep: #6B2510;
            --tl: #2D6B7F; --cr: #F5F0E8; --ch: #211F1C; --gd: #D4A84B;
            --gdl: #E8C870; --oc: #172B38; --lb: #3A3530;
            --panel: rgba(20, 18, 16, 0.97);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body { font-family: 'Manrope', sans-serif; background: var(--ch); color: var(--cr); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header { display: flex; align-items: center; justify-content: space-between; padding: 0 28px; height: 58px; background: rgba(18, 16, 14, 0.97); border-bottom: 1px solid rgba(212, 168, 75, 0.18); flex-shrink: 0; z-index: 200; }
        .logo { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 600; font-style: italic; color: var(--cr); letter-spacing: 0.02em; }
        .logo em { color: var(--gd); font-style: normal; font-weight: 700; }
        .header-stats { display: flex; gap: 24px; align-items: center; }
        .stat-item { text-align: center; }
        .stat-number { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 700; color: var(--tcl); line-height: 1; }
        .stat-label { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.14em; color: rgba(245, 240, 232, 0.4); margin-top: 2px; font-weight: 500; }
        .stat-divider { width: 1px; height: 24px; background: rgba(212, 168, 75, 0.12); }

        .un-toggle { display: flex; background: rgba(255,255,255,0.05); border-radius: 8px; padding: 3px; border: 1px solid rgba(255,255,255,0.08); }
        .un-btn { padding: 6px 14px; border-radius: 6px; font-size: 0.74rem; font-weight: 600; cursor: pointer; color: rgba(245, 240, 232, 0.45); border: none; background: none; transition: all 0.18s; font-family: inherit; }
        .un-btn:hover { color: rgba(245, 240, 232, 0.85); }
        .un-btn.active { background: var(--tl); color: var(--cr); }

        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 280px; background: rgba(16, 14, 12, 0.96); border-right: 1px solid rgba(212, 168, 75, 0.08); overflow-y: auto; flex-shrink: 0; }
        .sidebar::-webkit-scrollbar { width: 3px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(212,168,75,0.2); }

        .sidebar-header { padding: 14px 18px 10px; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.16em; color: rgba(245,240,232,0.3); font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .continent-group { border-bottom: 1px solid rgba(255,255,255,0.04); }
        .continent-header { display: flex; align-items: center; justify-content: space-between; padding: 11px 18px; cursor: pointer; transition: background 0.15s; }
        .continent-header:hover { background: rgba(255,255,255,0.025); }
        .continent-left { display: flex; align-items: center; gap: 10px; }
        .continent-icon { font-size: 1rem; }
        .continent-name { font-family: 'Fraunces', serif; font-size: 0.92rem; font-style: italic; font-weight: 500; color: var(--cr); }
        .progress-ring-wrap { position: relative; width: 38px; height: 38px; flex-shrink: 0; }
        .progress-ring-wrap svg { transform: rotate(-90deg); position: absolute; inset: 0; }
        .progress-ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.55rem; font-weight: 600; color: var(--tcl); line-height: 1.1; text-align: center; }
        .country-list { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .country-list.open { max-height: 2000px; }
        .country-list-inner { padding: 4px 10px 10px; }
        .country-item { display: flex; align-items: center; gap: 9px; padding: 5px 8px; border-radius: 6px; cursor: pointer; font-size: 0.78rem; color: rgba(245, 240, 232, 0.5); transition: all 0.12s; }
        .country-item:hover { background: rgba(255,255,255,0.05); color: var(--cr); }
        .country-item.visited { color: rgba(245, 240, 232, 0.92); font-weight: 500; }
        .country-item.visited:hover { background: rgba(196, 98, 45, 0.12); }
        .visit-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.12); }
        .visit-dot.visited { background: var(--tc); border-color: var(--tcd); box-shadow: 0 0 6px rgba(196,98,45,0.4); }
        .un-tag { font-size: 0.55rem; padding: 1px 5px; background: rgba(45, 107, 127, 0.4); color: var(--tl); border-radius: 3px; margin-left: auto; font-weight: 600; letter-spacing: 0.05em; }

        .map-container { flex: 1; position: relative; overflow: hidden; background: var(--oc); }
        #world-map { width: 100%; height: 100%; display: block; }
        .country-path { fill: var(--lb); stroke: rgba(18,15,12,0.8); stroke-width: 0.4; cursor: pointer; transition: fill 0.2s; }
        .country-path:hover { fill: var(--gdl) !important; }
        .country-path.visited { fill: var(--tc); }
        .country-path.visited:hover { fill: var(--tcl) !important; }
        .sphere { fill: var(--oc); }

        #tooltip { position: absolute; background: rgba(18,16,14,0.95); border: 1px solid rgba(212,168,75,0.25); color: var(--cr); padding: 8px 14px; border-radius: 7px; font-size: 0.8rem; pointer-events: none; opacity: 0; transition: opacity 0.12s; white-space: nowrap; backdrop-filter: blur(6px); z-index: 300; }
        #tooltip.show { opacity: 1; }
        .tt-name { font-family: 'Fraunces', serif; font-size: 0.92rem; font-weight: 500; }
        .tt-status { font-size: 0.7rem; margin-top: 2px; color: var(--tcl); }

        .map-controls { position: absolute; top: 18px; right: 18px; display: flex; background: rgba(16,14,12,0.92); border: 1px solid rgba(212,168,75,0.2); border-radius: 8px; overflow: hidden; backdrop-filter: blur(8px); z-index: 100; }
        .control-btn { padding: 8px 14px; font-size: 0.76rem; cursor: pointer; color: rgba(245,240,232,0.45); border: none; background: none; transition: all 0.18s; font-family: 'Manrope', sans-serif; font-weight: 500; }
        .control-btn:hover { color: var(--cr); }
        .control-btn.active { background: var(--tc); color: var(--cr); }

        .map-legend { position: absolute; bottom: 22px; left: 22px; background: rgba(16,14,12,0.9); border: 1px solid rgba(212,168,75,0.12); padding: 13px 16px; border-radius: 10px; backdrop-filter: blur(8px); z-index: 100; }
        .legend-title { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.16em; color: rgba(245,240,232,0.3); margin-bottom: 9px; font-weight: 600; }
        .legend-row { display: flex; align-items: center; gap: 9px; font-size: 0.73rem; color: rgba(245,240,232,0.6); margin-bottom: 5px; }
        .legend-row:last-child { margin-bottom: 0; }
        .legend-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

        /* DETAIL PANEL */
        .detail-panel { position: absolute; right: 0; top: 0; bottom: 0; width: 400px; background: var(--panel); border-left: 1px solid rgba(212,168,75,0.15); transform: translateX(100%); transition: transform 0.32s cubic-bezier(0.4,0,0.2,1); overflow-y: auto; z-index: 250; backdrop-filter: blur(10px); }
        .detail-panel.open { transform: translateX(0); }
        .detail-panel::-webkit-scrollbar { width: 4px; }
        .detail-panel::-webkit-scrollbar-thumb { background: rgba(212,168,75,0.25); }

        .detail-hero { position: relative; height: 180px; overflow: hidden; flex-shrink: 0; }
        .hero-bg { position: absolute; inset: 0; background: linear-gradient(135deg, var(--tcdeep), var(--tl)); }
        .hero-gradient { position: absolute; inset: 0; background: linear-gradient(to top, rgba(18,16,14,0.92) 0%, transparent 70%); }
        .hero-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px 22px; z-index: 2; }
        .hero-flag { font-size: 1.8rem; margin-bottom: 4px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4)); }
        .hero-name { font-family: 'Fraunces', serif; font-size: 1.7rem; font-weight: 700; color: var(--cr); line-height: 1.1; }
        .hero-continent { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.14em; color: rgba(245,240,232,0.55); margin-top: 4px; font-weight: 500; }
        .detail-close { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: var(--cr); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 0.9rem; z-index: 3; display: flex; align-items: center; justify-content: center; }

        .detail-body { padding: 20px 22px; }

        .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; margin-bottom: 16px; }
        .badge-visited { background: rgba(196,98,45,0.2); color: var(--tcl); border: 1px solid rgba(196,98,45,0.35); }
        .badge-not { background: rgba(255,255,255,0.06); color: rgba(245,240,232,0.5); border: 1px solid rgba(255,255,255,0.08); }

        .section-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.14em; color: rgba(245,240,232,0.4); font-weight: 600; margin-bottom: 10px; }

        .detail-actions { display: flex; gap: 10px; margin-bottom: 22px; }
        .action-btn { flex: 1; padding: 12px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; font-family: 'Manrope', sans-serif; }
        .btn-visited { background: var(--tc); color: var(--cr); border-color: var(--tcd); }
        .btn-visited:hover { background: var(--tcd); }
        .btn-visited.active { box-shadow: 0 0 0 3px rgba(212,168,75,0.4); border-color: var(--gd); }
        .btn-not-visited { background: rgba(255,255,255,0.06); color: rgba(245,240,232,0.75); border-color: rgba(255,255,255,0.12); }
        .btn-not-visited:hover { background: rgba(255,255,255,0.12); color: var(--cr); }
        .btn-not-visited.active { background: rgba(255,255,255,0.15); border-color: rgba(245,240,232,0.4); color: var(--cr); }

        .form-row { margin-bottom: 16px; }
        .form-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(245,240,232,0.4); font-weight: 600; margin-bottom: 6px; display: block; }
        .form-input, .form-textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 7px; padding: 9px 12px; color: var(--cr); font-size: 0.85rem; font-family: inherit; transition: border 0.15s; }
        .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--tc); background: rgba(255,255,255,0.07); }
        .form-textarea { resize: vertical; min-height: 60px; font-style: italic; line-height: 1.5; }

        /* PHOTO GALLERY */
        .photo-section { margin-top: 20px; }
        .photo-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .photo-count { font-size: 0.7rem; color: rgba(245,240,232,0.5); }
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .photo-cell { aspect-ratio: 1; border-radius: 6px; overflow: hidden; cursor: pointer; position: relative; transition: transform 0.18s; background: rgba(255,255,255,0.04); }
        .photo-cell:hover { transform: scale(1.03); z-index: 2; }
        .photo-cell img { width: 100%; height: 100%; object-fit: cover; }
        .photo-cell .photo-remove { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; background: rgba(0,0,0,0.7); color: var(--cr); border: none; border-radius: 50%; cursor: pointer; font-size: 0.7rem; display: none; align-items: center; justify-content: center; }
        .photo-cell:hover .photo-remove { display: flex; }
        .photo-add { aspect-ratio: 1; border-radius: 6px; background: rgba(196,98,45,0.08); border: 1px dashed rgba(196,98,45,0.3); display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(196,98,45,0.6); font-size: 0.75rem; cursor: pointer; transition: all 0.18s; gap: 4px; }
        .photo-add:hover { background: rgba(196,98,45,0.15); color: var(--tc); border-color: var(--tc); }
        .photo-add-icon { font-size: 1.4rem; }
        #photoInput { display: none; }

        /* LIGHTBOX */
        .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 40px; }
        .lightbox.open { display: flex; }
        .lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; }
        .lightbox-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.15); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .detail-panel { width: 100%; }
            header { padding: 0 14px; }
            .header-stats { gap: 12px; }
            .un-toggle { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">wander<em>log</em></div>

    <div class="header-stats">
        <div class="stat-item">
            <div class="stat-number" id="visitedCount">0</div>
            <div class="stat-label">Visited</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
            <div class="stat-number" id="continentCount">0</div>
            <div class="stat-label">Continents</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
            <div class="stat-number" id="percentCount">0%</div>
            <div class="stat-label">World</div>
        </div>
    </div>

    <div class="un-toggle">
        <button class="un-btn active" id="btn193" onclick="setUnMode(false)">193 UN</button>
        <button class="un-btn" id="btn265" onclick="setUnMode(true)">265 UN+</button>
    </div>
</header>

<div class="main-layout">
    <div class="sidebar">
        <div class="sidebar-header">Countries by Continent</div>
        <div id="continentsList"></div>
    </div>

    <div class="map-container" id="mapContainer">
        <svg id="world-map"></svg>

        <div class="map-controls">
            <button class="control-btn active" onclick="setProjection('natural', event)">Flat</button>
            <button class="control-btn" onclick="setProjection('ortho', event)">Globe</button>
        </div>

        <div class="map-legend">
            <div class="legend-title">Visit status</div>
            <div class="legend-row"><div class="legend-swatch" style="background: var(--tc)"></div> Visited</div>
            <div class="legend-row"><div class="legend-swatch" style="background: var(--lb)"></div> Not yet</div>
        </div>

        <div id="tooltip"></div>

        <div class="detail-panel" id="detailPanel">
            <div class="detail-hero">
                <div class="hero-bg" id="heroBg"></div>
                <div class="hero-gradient"></div>
                <div class="hero-info">
                    <div class="hero-flag" id="heroFlag">🌍</div>
                    <div class="hero-name" id="heroName">Country</div>
                    <div class="hero-continent" id="heroContinent">Continent</div>
                </div>
                <button class="detail-close" onclick="closePanel()">✕</button>
            </div>

            <div class="detail-body">
                <div id="statusBadge" class="status-badge badge-not">Not yet visited</div>

                <div class="section-label">Status</div>
                <div class="detail-actions">
                    <button class="action-btn btn-visited" id="btnVisited" onclick="markVisited()">✓ Visited</button>
                    <button class="action-btn btn-not-visited active" id="btnNotVisited" onclick="markNotVisited()">Not Yet</button>
                </div>

                <div class="form-row">
                    <label class="form-label">Year of first visit</label>
                    <input type="number" class="form-input" id="yearInput" min="1900" max="2099" placeholder="e.g. 2018" onchange="updateYear()">
                </div>

                <div class="form-row">
                    <label class="form-label">Notes</label>
                    <textarea class="form-textarea" id="notesInput" placeholder="Memories, highlights, recommendations..." onchange="updateNotes()"></textarea>
                </div>

                <div class="photo-section">
                    <div class="photo-header">
                        <div class="section-label" style="margin: 0">Photos</div>
                        <div class="photo-count" id="photoCount">0 / 25</div>
                    </div>
                    <div class="photo-grid" id="photoGrid"></div>
                    <input type="file" id="photoInput" accept="image/*" multiple onchange="handlePhotoUpload(event)">
                </div>
            </div>
        </div>
    </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightboxImg" src="" alt="">
</div>

<script>
let data = { countries: {} };
let currentCountryIso3 = null;
let projection = 'natural';
let worldData = null;
let showUnPlus = false;

// ─── LOAD ─────────────────────────────────────────────
async function loadData() {
    try {
        const response = await fetch('data/countries.json');
        const json = await response.json();
        json.countries.forEach(c => {
            // Restore visited state from localStorage
            const visStored = localStorage.getItem('v_' + c.iso3);
            const yrStored = localStorage.getItem('y_' + c.iso3);
            const notesStored = localStorage.getItem('n_' + c.iso3);
            c.visited = visStored !== null ? JSON.parse(visStored) : (c.visited || false);
            c.year = yrStored !== null ? parseInt(yrStored) : c.year;
            c.notes = notesStored !== null ? notesStored : (c.notes || '');
            // Photos from localStorage (base64)
            const photosStored = localStorage.getItem('p_' + c.iso3);
            c.localPhotos = photosStored ? JSON.parse(photosStored) : [];
            data.countries[c.iso3] = c;
        });
        renderSidebar();
        updateStats();
        await loadMap();
    } catch (e) {
        console.error('Failed to load data:', e);
    }
}

// ─── SIDEBAR ──────────────────────────────────────────
function renderSidebar() {
    const continents = ['Europe', 'Asia', 'Africa', 'North America', 'South America', 'Oceania', 'Antarctica'];
    const icons = {'Africa':'🌍', 'Antarctica':'🧊', 'Asia':'🏔', 'Europe':'🏛', 'North America':'🦅', 'Oceania':'🏝', 'South America':'🦙'};

    const openStates = {};
    document.querySelectorAll('.continent-group').forEach(g => {
        const cont = g.dataset.continent;
        const list = g.querySelector('.country-list');
        if (list && list.classList.contains('open')) openStates[cont] = true;
    });

    let html = '';
    continents.forEach(continent => {
        const allCountries = Object.values(data.countries).filter(c => c.continent === continent);
        const filtered = showUnPlus ? allCountries : allCountries.filter(c => !c.unPlus);
        const visited = filtered.filter(c => c.visited).length;
        const total = filtered.length;
        if (total === 0) return;
        const percent = total > 0 ? (visited / total) : 0;
        const dashOffset = 100.5 * (1 - percent);

        const countriesHtml = filtered.map(c => {
            const visClass = c.visited ? 'visited' : '';
            const unTag = c.unPlus ? '<span class="un-tag">UN+</span>' : '';
            return '<div class="country-item ' + visClass + '" onclick="openPanel(\'' + c.iso3 + '\')"><div class="visit-dot ' + visClass + '"></div>' + c.name + unTag + '</div>';
        }).join('');

        const openClass = openStates[continent] ? 'open' : '';

        html += '<div class="continent-group" data-continent="' + continent + '">' +
            '<div class="continent-header" onclick="toggleContinent(this)">' +
                '<div class="continent-left">' +
                    '<span class="continent-icon">' + (icons[continent] || '🌐') + '</span>' +
                    '<span class="continent-name">' + continent + '</span>' +
                '</div>' +
                '<div class="progress-ring-wrap">' +
                    '<svg viewBox="0 0 40 40" width="38" height="38">' +
                        '<circle cx="20" cy="20" r="16" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="3.5"/>' +
                        '<circle cx="20" cy="20" r="16" fill="none" stroke="#C4622D" stroke-width="3.5" stroke-dasharray="100.5" stroke-dashoffset="' + dashOffset.toFixed(1) + '" stroke-linecap="round"/>' +
                    '</svg>' +
                    '<div class="progress-ring-text">' + visited + '<br>/ ' + total + '</div>' +
                '</div>' +
            '</div>' +
            '<div class="country-list ' + openClass + '"><div class="country-list-inner">' + countriesHtml + '</div></div>' +
        '</div>';
    });

    document.getElementById('continentsList').innerHTML = html;
}

function toggleContinent(el) {
    el.nextElementSibling.classList.toggle('open');
}

// ─── STATS ─────────────────────────────────────────────
function updateStats() {
    const countries = Object.values(data.countries);
    const filtered = showUnPlus ? countries : countries.filter(c => !c.unPlus);
    const visited = filtered.filter(c => c.visited).length;
    const total = filtered.length;
    const percent = total > 0 ? Math.round((visited / total) * 100) : 0;
    const continents = new Set(filtered.filter(c => c.visited).map(c => c.continent));
    document.getElementById('visitedCount').textContent = visited;
    document.getElementById('continentCount').textContent = continents.size;
    document.getElementById('percentCount').textContent = percent + '%';
}

// ─── UN TOGGLE ────────────────────────────────────────
function setUnMode(unPlus) {
    showUnPlus = unPlus;
    document.getElementById('btn193').classList.toggle('active', !unPlus);
    document.getElementById('btn265').classList.toggle('active', unPlus);
    renderSidebar();
    updateStats();
}

// ─── PANEL ─────────────────────────────────────────────
function openPanel(iso3) {
    const country = data.countries[iso3];
    if (!country) return;
    currentCountryIso3 = iso3;

    document.getElementById('heroFlag').textContent = getFlagEmoji(country.iso2);
    document.getElementById('heroName').textContent = country.name;
    document.getElementById('heroContinent').textContent = country.continent + (country.unPlus ? ' • UN+' : '');

    const heroBg = document.getElementById('heroBg');
    const hash = iso3.split('').reduce((a, b) => a + b.charCodeAt(0), 0);
    const h1 = (hash * 7) % 60 + 10;
    const h2 = (hash * 13) % 80 + 180;
    heroBg.style.background = 'linear-gradient(135deg, hsl(' + h1 + ',55%,28%) 0%, hsl(' + h2 + ',45%,32%) 100%)';

    document.getElementById('btnVisited').classList.toggle('active', country.visited);
    document.getElementById('btnNotVisited').classList.toggle('active', !country.visited);

    const badge = document.getElementById('statusBadge');
    if (country.visited) {
        badge.textContent = '✓ Visited';
        badge.className = 'status-badge badge-visited';
    } else {
        badge.textContent = 'Not yet visited';
        badge.className = 'status-badge badge-not';
    }

    document.getElementById('yearInput').value = country.year || '';
    document.getElementById('notesInput').value = country.notes || '';

    renderPhotos();
    document.getElementById('detailPanel').classList.add('open');
}

function closePanel() {
    document.getElementById('detailPanel').classList.remove('open');
    currentCountryIso3 = null;
}

// ─── VISITED TOGGLES ───────────────────────────────────
function markVisited() {
    if (!currentCountryIso3) return;
    data.countries[currentCountryIso3].visited = true;
    localStorage.setItem('v_' + currentCountryIso3, 'true');
    refreshAll();
}

function markNotVisited() {
    if (!currentCountryIso3) return;
    data.countries[currentCountryIso3].visited = false;
    localStorage.setItem('v_' + currentCountryIso3, 'false');
    refreshAll();
}

function updateYear() {
    if (!currentCountryIso3) return;
    const val = document.getElementById('yearInput').value;
    data.countries[currentCountryIso3].year = val ? parseInt(val) : null;
    if (val) localStorage.setItem('y_' + currentCountryIso3, val);
    else localStorage.removeItem('y_' + currentCountryIso3);
}

function updateNotes() {
    if (!currentCountryIso3) return;
    const val = document.getElementById('notesInput').value;
    data.countries[currentCountryIso3].notes = val;
    if (val) localStorage.setItem('n_' + currentCountryIso3, val);
    else localStorage.removeItem('n_' + currentCountryIso3);
}

function refreshAll() {
    renderSidebar();
    updateStats();
    redrawMapColors();
    if (currentCountryIso3) openPanel(currentCountryIso3);
}

// ─── PHOTOS ─────────────────────────────────────────────
function renderPhotos() {
    if (!currentCountryIso3) return;
    const country = data.countries[currentCountryIso3];
    const grid = document.getElementById('photoGrid');
    const repoPhotos = (country.photos || []).map(name => ({type: 'repo', src: 'photos/' + country.iso3 + '/' + name, name: name}));
    const localPhotos = (country.localPhotos || []).map((p, i) => ({type: 'local', src: p, index: i}));
    const allPhotos = repoPhotos.concat(localPhotos);

    document.getElementById('photoCount').textContent = allPhotos.length + ' / 25';

    let html = '';
    allPhotos.forEach((p, i) => {
        const removeBtn = p.type === 'local' ? '<button class="photo-remove" onclick="event.stopPropagation();removePhoto(' + p.index + ')">✕</button>' : '';
        html += '<div class="photo-cell" onclick="openLightbox(\'' + p.src.replace(/'/g, "\\'") + '\')"><img src="' + p.src + '" onerror="this.parentElement.style.display=\'none\'">' + removeBtn + '</div>';
    });
    if (allPhotos.length < 25) {
        html += '<div class="photo-add" onclick="document.getElementById(\'photoInput\').click()"><span class="photo-add-icon">+</span><span>Add</span></div>';
    }
    grid.innerHTML = html;
}

function handlePhotoUpload(event) {
    if (!currentCountryIso3) return;
    const files = event.target.files;
    if (!files.length) return;
    const country = data.countries[currentCountryIso3];
    if (!country.localPhotos) country.localPhotos = [];

    Array.from(files).forEach(file => {
        if (country.localPhotos.length >= 25 - (country.photos || []).length) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            // Compress image
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const maxW = 1200;
                const scale = Math.min(1, maxW / img.width);
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
                country.localPhotos.push(dataUrl);
                try {
                    localStorage.setItem('p_' + currentCountryIso3, JSON.stringify(country.localPhotos));
                } catch (err) {
                    alert('Storage full. Remove some photos first.');
                    country.localPhotos.pop();
                }
                renderPhotos();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
    event.target.value = '';
}

function removePhoto(index) {
    if (!currentCountryIso3) return;
    const country = data.countries[currentCountryIso3];
    country.localPhotos.splice(index, 1);
    if (country.localPhotos.length > 0) {
        localStorage.setItem('p_' + currentCountryIso3, JSON.stringify(country.localPhotos));
    } else {
        localStorage.removeItem('p_' + currentCountryIso3);
    }
    renderPhotos();
}

function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
}

// ─── MAP ───────────────────────────────────────────────
async function loadMap() {
    try {
        const response = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
        worldData = await response.json();
        renderMap();
    } catch (e) {
        console.error('Map load failed:', e);
    }
}

function renderMap() {
    if (!worldData) return;
    const container = document.getElementById('mapContainer');
    const W = container.clientWidth;
    const H = container.clientHeight;

    d3.select('#world-map').selectAll('*').remove();
    const svg = d3.select('#world-map').attr('width', W).attr('height', H);

    let proj;
    if (projection === 'natural') {
        proj = d3.geoNaturalEarth1().scale(W / 6.3).translate([W / 2, H / 2]);
    } else {
        proj = d3.geoOrthographic().scale(Math.min(W, H) / 2.2).translate([W / 2, H / 2]).rotate([-15, -30]);
    }

    const path = d3.geoPath().projection(proj);
    const tooltip = document.getElementById('tooltip');

    svg.append('path').datum({ type: 'Sphere' }).attr('class', 'sphere').attr('d', path);

    const countries = topojson.feature(worldData, worldData.objects.countries);
    svg.selectAll('.country-path')
        .data(countries.features)
        .enter()
        .append('path')
        .attr('class', d => {
            const c = findCountryByNumericId(d.id);
            return 'country-path' + (c && c.visited ? ' visited' : '');
        })
        .attr('d', path)
        .on('mousemove', (event, d) => {
            const c = findCountryByNumericId(d.id);
            if (!c) return;
            tooltip.innerHTML = '<div class="tt-name">' + c.name + '</div>' + (c.visited ? '<div class="tt-status">✓ Visited</div>' : '<div class="tt-status" style="color:rgba(255,255,255,0.5)">Click to mark</div>');
            tooltip.style.left = (event.offsetX + 14) + 'px';
            tooltip.style.top = (event.offsetY - 10) + 'px';
            tooltip.classList.add('show');
        })
        .on('mouseleave', () => tooltip.classList.remove('show'))
        .on('click', (event, d) => {
            const c = findCountryByNumericId(d.id);
            if (c) openPanel(c.iso3);
            else console.log('No country found for ID:', d.id);
        });

    if (projection === 'ortho') {
        let r0, pos0;
        svg.call(d3.drag()
            .on('start', e => { r0 = proj.rotate(); pos0 = [e.x, e.y]; })
            .on('drag', e => {
                proj.rotate([r0[0] + (e.x - pos0[0]) * 0.4, r0[1] - (e.y - pos0[1]) * 0.4]);
                svg.selectAll('path').attr('d', path);
            })
        );
    }
}

// Only update colors without full re-render (preserves drag state, click handlers)
function redrawMapColors() {
    d3.select('#world-map').selectAll('.country-path')
        .attr('class', d => {
            const c = findCountryByNumericId(d.id);
            return 'country-path' + (c && c.visited ? ' visited' : '');
        });
}

// CRITICAL FIX: D3 topojson IDs are STRINGS, our data has NUMBERS — coerce both to Number
function findCountryByNumericId(id) {
    const numId = Number(id);
    return Object.values(data.countries).find(c => Number(c.id) === numId);
}

function getFlagEmoji(iso2) {
    if (!iso2 || iso2.length !== 2 || iso2 === '--') return '🏳';
    return String.fromCodePoint(...[...iso2.toUpperCase()].map(x => 127397 + x.charCodeAt()));
}

function setProjection(p, ev) {
    projection = p;
    document.querySelectorAll('.control-btn').forEach(b => b.classList.remove('active'));
    if (ev) ev.target.classList.add('active');
    renderMap();
}

window.addEventListener('resize', () => { if (worldData) renderMap(); });
window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        if (document.getElementById('lightbox').classList.contains('open')) closeLightbox();
        else closePanel();
    }
});

loadData();
</script>
